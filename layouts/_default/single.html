{{ define "main" }}
<section class="page-header">
    <div class="container">
        <h1 class="page-header__title">{{ .Title }}</h1>
        {{ with .Description }}
        <p class="page-header__description">{{ . }}</p>
        {{ end }}
    </div>
</section>
<section class="section">
    <div class="container page-content-body">
        {{ .Content }}
    </div>
</section>
{{ end }}
