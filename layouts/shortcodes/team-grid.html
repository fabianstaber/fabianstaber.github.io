<div class="team-grid">
    {{ range site.Data.team }}
    <article class="team-card">
        <!-- <div class="team-card__avatar">{{ .avatar }}</div>-->
        <h3 class="team-card__name">{{ .name }}</h3>
        <p class="team-card__role">{{ index .role site.Language.Lang }}</p>
        <a href="mailto:{{ .email }}" class="team-card__email">{{ .email }}</a>
    </article>
    {{ end }}
</div>
