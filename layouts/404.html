{{ define "main" }}
<style>
    .error-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - var(--header-height));
        text-align: center;
        padding: var(--space-3xl) var(--space-xl);
    }

    .error-page__code {
        font-family: var(--font-heading);
        font-size: 8rem;
        font-weight: 700;
        color: var(--color-primary);
        line-height: 1;
        margin-bottom: var(--space-md);
    }

    .error-page__title {
        margin-bottom: var(--space-md);
    }

    .error-page__text {
        color: var(--color-text-light);
        max-width: 450px;
        margin-bottom: var(--space-xl);
    }
</style>

<section class="error-page">
    <p class="error-page__code">404</p>
    <h1 class="error-page__title">{{ i18n "error_404_title" }}</h1>
    <p class="error-page__text">{{ i18n "error_404_text" }}</p>
    <a href="{{ .Site.Home.RelPermalink }}" class="btn btn--primary btn--large">{{ i18n "error_404_btn" }}</a>
</section>
{{ end }}
